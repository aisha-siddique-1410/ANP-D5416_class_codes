<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Status Board</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color: #f8f9fa;
        }

        .main-container{
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 40px;
        }

        .status-card{
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .status-icon{
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            color: white;
        }

        .close-btn{
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container my-5">

        <div class="main-container">

            <h1 class="text-center display-3 fw-bold mb-5">
                Status Board
            </h1>

            <!-- Success Card -->
            <div class="status-card border border-success bg-success-subtle">

                <div class="row align-items-center">

                    <div class="col-auto">
                        <div class="status-icon bg-success">
                            ✓
                        </div>
                    </div>

                    <div class="col">
                        <h2 class="text-success fw-bold">
                            Success
                        </h2>

                        <p class="mb-0 fs-4">
                            Your operation was completed successfully.
                        </p>
                    </div>

                    <div class="col-auto">
                        <span class="close-btn text-success">
                            ×
                        </span>
                    </div>

                </div>

            </div>

            <!-- Warning Card -->
            <div class="status-card border border-warning bg-warning-subtle">

                <div class="row align-items-center">

                    <div class="col-auto">
                        <div class="status-icon bg-warning">
                            !
                        </div>
                    </div>

                    <div class="col">
                        <h2 class="text-warning fw-bold">
                            Warning
                        </h2>

                        <p class="mb-0 fs-4">
                            This action might have some unintended consequences.
                        </p>
                    </div>

                    <div class="col-auto">
                        <span class="close-btn text-warning">
                            ×
                        </span>
                    </div>

                </div>

            </div>

            <!-- Error Card -->
            <div class="status-card border border-danger bg-danger-subtle">

                <div class="row align-items-center">

                    <div class="col-auto">
                        <div class="status-icon bg-danger">
                            ✕
                        </div>
                    </div>

                    <div class="col">
                        <h2 class="text-danger fw-bold">
                            Error
                        </h2>

                        <p class="mb-0 fs-4">
                            Something went wrong. Please try again.
                        </p>
                    </div>

                    <div class="col-auto">
                        <span class="close-btn text-danger">
                            ×
                        </span>
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
